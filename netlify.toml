# Netlify build configuration
# Project uses Next.js static export (output: 'export') → emits ./out
# Netlify just serves the static files; no Next.js runtime adapter needed.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  # Skip Netlify's automatic Next.js plugin since we're using static export.
  NEXT_USE_NETLIFY_EDGE = "false"

# Long-cache static assets (Next.js fingerprints chunk filenames)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
